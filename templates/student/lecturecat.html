{% extends "student_base.html" %}
{% load static %}
{% block content %}
{% if not request.session.email %}
<script>
alert("you have to login first");location.href="/login/"
</script>
{% endif %}

    
        <div class="row heading mt-3">
            <div class="col-sm-6 mx-auto">
    <div class="text-center fs-3">Lectures<b class="text-mycolor3"> category <i class="fa-solid fa-school"></i></b>
    <p class="text-muted fs-6">Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
    </div>
    <hr>
    </div>
</div>
  <div class="row py-4">
    <div class="col-sm-10 bg-light mx-auto">
        <div class="row">
            {% for r in categories %}
            <!--start category-->
            <div class="col-sm-3 p-1" >
               
                <div class="card shadow-lg p-2 mb-3  border-0" style="position: relative;">
                     <span class="position-absolute top-0 start-50 translate-middle btn bg-mycolor3">{{r.title}}</span>
                 <a href="/student/lectures?cid={{r.id}}">  <img src="/{{r.picture}}" class="card-img-top" alt=""></a>
                 {{r.id}}
                </div>
            </div>
            <!--end category-->
            {% endfor %}
        </div>
    </div>
</div>
{% endblock %}
